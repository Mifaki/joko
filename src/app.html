<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- SEO -->
		<title>Joko - JSON Formatter</title>
		<meta
			name="description"
			content="Free online JSON formatter, validator & beautifier. Real-time formatting with syntax highlighting, error detection, and smart fix suggestions. Handles large JSON files with blazing-fast performance."
		/>
		<meta
			name="keywords"
			content="JSON formatter, JSON validator, JSON beautifier, JSON minifier, JSON lint, JSON pretty print, online JSON tool, JSON editor, JSON parser"
		/>
		<meta name="author" content="Joko" />
		<meta name="robots" content="index, follow" />
		<meta name="theme-color" content="#FFFFFF" />

		<!-- Open Graph -->
		<meta property="og:title" content="Joko - JSON Formatter" />
		<meta
			property="og:description"
			content="Real-time JSON formatting, validation and error detection with syntax highlighting. Handles large files efficiently with Web Workers."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://jsonforge.dev" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Joko - JSON Formatter" />
		<meta
			name="twitter:description"
			content="Real-time JSON formatting, validation and error detection."
		/>

		<!-- Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=JetBrains+Mono:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
